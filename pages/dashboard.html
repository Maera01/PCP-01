<div class="page active" id="page-dashboard">
  <div class="kpi-grid">
    <div class="kpi-card">
      <div class="kpi-label">Em Produção</div>
      <div class="kpi-value" id="kpi-producao">0</div>
      <div class="kpi-sub">pedidos ativos</div>
    </div>
    <div class="kpi-card kpi-danger">
      <div class="kpi-label">Em Atraso</div>
      <div class="kpi-value" id="kpi-atraso">0</div>
      <div class="kpi-sub">pedidos</div>
    </div>
    <div class="kpi-card kpi-danger">
      <div class="kpi-label">Faltando MP</div>
      <div class="kpi-value" id="kpi-faltando">0</div>
      <div class="kpi-sub">travados</div>
    </div>
    <div class="kpi-card kpi-warning">
      <div class="kpi-label">Separação Parcial</div>
      <div class="kpi-value" id="kpi-parcial">0</div>
      <div class="kpi-sub">pedidos</div>
    </div>
    <div class="kpi-card kpi-success">
      <div class="kpi-label">Prontos p/ Expedição</div>
      <div class="kpi-value" id="kpi-prontos">0</div>
      <div class="kpi-sub" id="kpi-prontos-sub">aguardando envio</div>
    </div>
    <div class="kpi-card kpi-warning">
      <div class="kpi-label">Aguard. Conferência</div>
      <div class="kpi-value" id="kpi-expedicao">0</div>
      <div class="kpi-sub" id="kpi-expedicao-sub">0% aceitos</div>
    </div>
  </div>

  <div class="dashboard-grid">
    <div class="card">
      <div class="card-header">
        <h2>Pedidos Recentes</h2>
        <span class="count-badge">Visualização</span>
      </div>
      <div class="card-body">
        <table class="table">
          <thead>
            <tr>
              <th>Produto</th>
              <th>Série</th>
              <th>Prazo</th>
              <th>Status</th>
              <th>Etapa</th>
            </tr>
          </thead>
          <tbody id="tbody-recentes"></tbody>
        </table>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Por Equipamento</h2>
      </div>
      <div class="card-body">
        <div class="bar-chart" id="chart-equip"></div>
      </div>
    </div>
  </div>

  <div class="dashboard-grid dashboard-grid-three">
    <div class="card">
      <div class="card-header">
        <h2>Por Etapa Atual</h2>
      </div>
      <div class="card-body">
        <div class="bar-chart" id="chart-etapas"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Almoxarifado</h2>
      </div>
      <div class="card-body">
        <div class="bar-chart" id="chart-almox"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <h2>Problemas</h2>
      </div>
      <div class="card-body">
        <div class="bar-chart" id="chart-problemas"></div>
      </div>
    </div>
  </div>
</div>
